<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GitHub HTML 测试页面</title>
    <style>
        body {
            text-align: center;
            margin-top: 60px;
            font-size: 20px;
            background: #f5f5f5;
        }
        .box {
            background: white;
            padding: 30px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>✅ GitHub HTML 测试成功</h1>
        <p>这是一个放在 GitHub 里的网页</p>
        <p>当前时间：<span id="time"></span></p>
    </div>

    <script>
        // 显示当前时间，证明页面正常运行
        document.getElementById('time').innerText = new Date().toLocaleString();
    </script>
</body>
</html>
